services:
  # Database
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER?err}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD?err}
      POSTGRES_DB: ${POSTGRES_DB?err}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./postgresql_data:/var/lib/postgresql/data
    restart: always
